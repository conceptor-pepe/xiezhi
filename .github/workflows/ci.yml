name: Speclawd CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate Speclawd
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Scripts
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/check.sh scripts/release-preflight.sh scripts/speclawd-verify.sh scripts/speclawd-archive.sh scripts/speclawd-new-change.sh install/init.sh

      - name: Run Speclawd checks
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/check.sh
